<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - GeoWiki</title>
    <link rel="stylesheet" href="css/design-system.css?v=20260407">
    <link rel="stylesheet" href="css/style.css?v=20260407">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            padding-top: 80px;
        }

        .profile-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--spacing-2xl) var(--spacing-xl);
            min-height: 100vh;
        }

        .profile-header {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: var(--spacing-2xl);
            margin-bottom: var(--spacing-3xl);
            align-items: center;
            padding: var(--spacing-2xl);
            background: linear-gradient(135deg, rgba(77, 163, 255, 0.1) 0%, rgba(124, 255, 178, 0.05) 100%);
            border: 1px solid rgba(77, 163, 255, 0.2);
            border-radius: var(--border-radius-2xl);
            backdrop-filter: blur(10px);
        }

        .profile-avatar {
            width: 150px;
            height: 150px;
            background: var(--primary-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            box-shadow: 0 0 40px rgba(77, 163, 255, 0.4);
        }

        .profile-info h1 {
            font-size: var(--text-4xl);
            font-weight: 900;
            margin-bottom: var(--spacing-sm);
            color: white;
        }

        .profile-info p {
            font-size: var(--text-lg);
            color: var(--text-secondary);
            margin: var(--spacing-sm) 0;
        }

        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-xl);
            margin-bottom: var(--spacing-3xl);
        }

        .stat-box {
            padding: var(--spacing-2xl);
            background: linear-gradient(135deg, rgba(77, 163, 255, 0.1) 0%, rgba(124, 255, 178, 0.05) 100%);
            border: 1px solid rgba(77, 163, 255, 0.2);
            border-radius: var(--border-radius-xl);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stat-box-icon {
            font-size: 3rem;
            margin-bottom: var(--spacing-md);
        }

        .stat-box-value {
            font-size: var(--text-4xl);
            font-weight: 900;
            color: var(--primary-color);
        }

        .stat-box-label {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            margin-top: var(--spacing-sm);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-title {
            font-size: var(--text-3xl);
            font-weight: 900;
            margin: var(--spacing-3xl) 0 var(--spacing-xl);
            color: white;
            border-bottom: 2px solid rgba(77, 163, 255, 0.2);
            padding-bottom: var(--spacing-lg);
        }

        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: var(--spacing-xl);
            margin-bottom: var(--spacing-3xl);
        }

        .achievement {
            padding: var(--spacing-lg);
            background: linear-gradient(135deg, rgba(77, 163, 255, 0.1) 0%, rgba(124, 255, 178, 0.05) 100%);
            border: 1px solid rgba(77, 163, 255, 0.2);
            border-radius: var(--border-radius-xl);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0.6;
        }

        .achievement.unlocked {
            opacity: 1;
            background: linear-gradient(135deg, rgba(124, 255, 178, 0.2) 0%, rgba(77, 163, 255, 0.1) 100%);
            border-color: rgba(124, 255, 178, 0.4);
            box-shadow: 0 0 30px rgba(124, 255, 178, 0.2);
        }

        .achievement-emoji {
            font-size: 2.5rem;
            margin-bottom: var(--spacing-sm);
        }

        .achievement-name {
            font-size: var(--text-sm);
            font-weight: 700;
            color: var(--text-secondary);
        }

        .achievement.unlocked .achievement-name {
            color: var(--secondary-color);
        }

        .progress-item {
            padding: var(--spacing-lg);
            background: linear-gradient(135deg, rgba(77, 163, 255, 0.1) 0%, rgba(124, 255, 178, 0.05) 100%);
            border: 1px solid rgba(77, 163, 255, 0.2);
            border-radius: var(--border-radius-xl);
            margin-bottom: var(--spacing-lg);
        }

        .progress-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-md);
        }

        .progress-item-title {
            font-weight: 700;
            color: white;
        }

        .progress-percentage {
            color: var(--primary-color);
            font-weight: 800;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(77, 163, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-gradient);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 700;
            margin-bottom: var(--spacing-2xl);
            transition: all 0.3s ease;
        }

        .back-button:hover {
            gap: var(--spacing-md);
            color: var(--secondary-color);
        }

        @media (max-width: 768px) {
            .profile-header {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .profile-avatar {
                width: 100px;
                height: 100px;
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav class="glass-nav">
            <div class="nav-container">
                <div class="logo">
                    <span class="logo-icon">🌍</span>
                    <span class="logo-text">GeoWiki</span>
                </div>
                <ul class="nav-links">
                    <li><a href="index.html" class="nav-link">Главная</a></li>
                    <li><a href="map.html" class="nav-link">Карта</a></li>
                    <li><a href="index.html#levels" class="nav-link">Уровни</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <div class="profile-container">
        <a href="index.html" class="back-button">← Вернуться</a>

        <div class="profile-header">
            <div class="profile-avatar">🧭</div>
            <div class="profile-info">
                <h1>Географ-Путешественник</h1>
                <p id="user-level">Уровень: Начальный</p>
                <p id="user-xp">XP: 0 / 1000</p>
            </div>
        </div>

        <div class="stats-overview">
            <div class="stat-box">
                <div class="stat-box-icon">🌍</div>
                <div class="stat-box-value" id="countries-explored">0</div>
                <div class="stat-box-label">Стран изучено</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-icon">⭐</div>
                <div class="stat-box-value" id="total-xp">0</div>
                <div class="stat-box-label">Всего XP</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-icon">🏆</div>
                <div class="stat-box-value" id="achievements-count">0</div>
                <div class="stat-box-label">Достижений</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-icon">📚</div>
                <div class="stat-box-value" id="levels-completed">0</div>
                <div class="stat-box-label">Уровней пройдено</div>
            </div>
        </div>

        <h2 class="section-title">🎖️ Достижения</h2>
        <div class="achievements-grid" id="achievements">
            <!-- Генерируется JS -->
        </div>

        <h2 class="section-title">📊 Прогресс Обучения</h2>
        <div id="progress-list">
            <!-- Генерируется JS -->
        </div>
    </div>

    <script src="js/app.js?v=20260407" type="module"></script>
    <script src="js/main.js?v=20260407"></script>
    <script src="js/progress.js?v=20260407"></script>
    <script>
        // Sample achievements
        const achievements = [
            { id: 'first-country', emoji: '🌍', name: 'Первая страна', unlocked: false },
            { id: 'continent-master', emoji: '🗺️', name: 'Мастер материка', unlocked: false },
            { id: 'quiz-master', emoji: '🧠', name: 'Знаток карт', unlocked: false },
            { id: 'explorer', emoji: '🧭', name: 'Исследователь', unlocked: false },
            { id: 'level-complete', emoji: '✅', name: 'Полный курс', unlocked: false },
            { id: 'streak', emoji: '🔥', name: '7-дневный стрик', unlocked: false },
            { id: 'speed-demon', emoji: '⚡', name: 'Молния', unlocked: false },
            { id: 'perfect-score', emoji: '💯', name: 'Идеальный результат', unlocked: false },
        ];

        // Mock progress data
        const levelsProgress = [
            { name: 'Начальный', progress: 100 },
            { name: 'Уверенный', progress: 60 },
            { name: 'Эксперт', progress: 30 },
            { name: 'Профессиональный', progress: 10 },
            { name: 'Географ', progress: 0 },
        ];

        // Render achievements
        const achievementsDiv = document.getElementById('achievements');
        achievements.forEach((achievement, index) => {
            const div = document.createElement('div');
            div.className = `achievement ${Math.random() > 0.6 ? 'unlocked' : ''}`;
            div.innerHTML = `
                <div class="achievement-emoji">${achievement.emoji}</div>
                <div class="achievement-name">${achievement.name}</div>
            `;
            achievementsDiv.appendChild(div);
        });

        // Render progress
        const progressList = document.getElementById('progress-list');
        levelsProgress.forEach(level => {
            const div = document.createElement('div');
            div.className = 'progress-item';
            div.innerHTML = `
                <div class="progress-item-header">
                    <span class="progress-item-title">${level.name}</span>
                    <span class="progress-percentage">${level.progress}%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${level.progress}%"></div>
                </div>
            `;
            progressList.appendChild(div);
        });

        // Update stats from localStorage
        const progressData = JSON.parse(localStorage.getItem('geoWikiProgress') || '{}');
        document.getElementById('countries-explored').textContent = Object.keys(progressData.completedLevels || {}).length;
        document.getElementById('total-xp').textContent = progressData.xp || '0';
        document.getElementById('achievements-count').textContent = document.querySelectorAll('.achievement.unlocked').length;
        document.getElementById('levels-completed').textContent = Object.keys(progressData.completedLevels || {}).length;

        // Calculate level
        const xp = progressData.xp || 0;
        if (xp >= 5000) {
            document.getElementById('user-level').textContent = 'Уровень: Географ';
        } else if (xp >= 3000) {
            document.getElementById('user-level').textContent = 'Уровень: Профессиональный';
        } else if (xp >= 1500) {
            document.getElementById('user-level').textContent = 'Уровень: Эксперт';
        } else if (xp >= 500) {
            document.getElementById('user-level').textContent = 'Уровень: Уверенный';
        }
    </script>
</body>
</html>
